<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Next Dose</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff; margin: 0; display: flex; justify-content: center; color: #111; -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 400px; padding: 25px 20px; box-sizing: border-box; text-align: center; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        
        h1 { font-size: 2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 0.9rem; color: #666; margin: 5px 0 20px; font-weight: 500; }
        
        /* Main Action Button */
        .now-btn { 
            width: 100%; padding: 20px; font-size: 1.2rem; font-weight: 800; 
            background: #111; color: #fff; border: none; border-radius: 15px; 
            cursor: pointer; margin-bottom: 20px; transition: opacity 0.2s;
        }
        .now-btn:active { opacity: 0.8; }

        .label { font-size: 0.75rem; font-weight: 700; color: #999; text-transform: uppercase; margin-bottom: 10px; text-align: left; }
        
        /* Interval Grid */
        .interval-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .int-btn { 
            padding: 12px 0; font-size: 1rem; font-weight: 700; background: #fff; 
            border: 1px solid #eee; border-radius: 15px; cursor: pointer; color: #444;
        }
        .int-btn.active { background: #111; color: #fff; border-color: #111; }

        /* Result Display */
        .result-box { 
            background: #fafafa; border-radius: 15px; padding: 30px 15px; margin-bottom: 20px;
            display: flex; flex-direction: column; justify-content: center; border: 1px solid #f0f0f0;
        }
        .res-label { font-size: 0.75rem; color: #999; margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
        .res-time { font-size: 3.5rem; font-weight: 800; color: #111; line-height: 1; letter-spacing: -2px; }

        .clear-btn { 
            width: 100%; padding: 12px; background: transparent; color: #bbb; 
            border: none; font-size: 0.8rem; font-weight: 600; cursor: pointer;
        }

        /* Footer */
        .footer-group { border-top: 1px solid #f0f0f0; padding-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        footer { font-size: 10px; color: #aaa; line-height: 1.4; padding-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <h1>Next Dose</h1>
        <p class="subtitle">Forget the math, just take your meds.</p>
        
        <button class="now-btn" onclick="setNow()">I TOOK IT NOW</button>

        <div class="label">Interval (Hours)</div>
        <div class="interval-grid">
            <button class="int-btn" onclick="setInt(4, this)">4h</button>
            <button class="int-btn active" onclick="setInt(6, this)">6h</button>
            <button class="int-btn" onclick="setInt(8, this)">8h</button>
            <button class="int-btn" onclick="setInt(12, this)">12h</button>
        </div>

        <div class="result-box">
            <div class="res-label">Next Dose At</div>
            <div id="nextTime" class="res-time">--:--</div>
        </div>

        <button class="clear-btn" onclick="reset()">Reset</button>
    </div>

    <div class="footer-group">
        <footer>
            No login / No tracking / No ads / Browser only<br>
            Privacy Policy<br>
            afrorakda © 2026
        </footer>
    </div>
</div>

<script>
    let interval = 6;
    let startTime = null;

    function setNow() {
        startTime = new Date();
        calculate();
    }

    function setInt(h, btn) {
        interval = h;
        document.querySelectorAll('.int-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (startTime) calculate();
    }

    function calculate() {
        if (!startTime) return;
        const next = new Date(startTime.getTime() + (interval * 60 * 60 * 1000));
        const hh = String(next.getHours()).padStart(2, '0');
        const mm = String(next.getMinutes()).padStart(2, '0');
        document.getElementById('nextTime').innerText = hh + ":" + mm;
    }

    function reset() {
        startTime = null;
        document.getElementById('nextTime').innerText = "--:--";
    }
</script>

</body>
</html>
